<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuel Route Planner</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      :root {
        --sidebar-w: 400px;
        --bg: linear-gradient(180deg, #fdfcfa 0%, #f6f3ee 100%);
        --panel: #ffffff;
        --border: #e8e4dd;
        --ink: #2b2722;
        --muted: #8a8378;
        --accent: #2b2722;
        --start: #2e7d52;
        --finish: #b3473f;
        --fuel: #b07d2b;
        --danger: #b3473f;
        --radius: 10px;
        --shadow-sm: 0 1px 2px rgba(43, 39, 34, 0.06);
        --shadow-md: 0 4px 16px rgba(43, 39, 34, 0.08);
        --ease: cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        height: 100vh;
      }

      /* ---------- Sidebar ---------- */
      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 28px 26px 32px;
        animation: fadeIn 0.4s var(--ease);
      }
      .sidebar::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: #ddd8cf;
        border-radius: 6px;
      }

      .sidebar h1 {
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 4px;
      }
      .subtitle {
        font-size: 0.84rem;
        color: var(--muted);
        margin: 0 0 24px;
        line-height: 1.5;
      }

      /* ---------- Form ---------- */
      #route-form label {
        display: block;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 6px;
      }
      .input-wrap {
        position: relative;
        margin-bottom: 16px;
      }
      .input-wrap .dot {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        pointer-events: none;
      }
      .dot-start {
        background: var(--start);
      }
      .dot-finish {
        background: var(--finish);
      }
      input[type="text"] {
        width: 100%;
        padding: 12px 12px 12px 32px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 0.92rem;
        font-family: inherit;
        color: var(--ink);
        background: #fdfcfa;
        transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #c5beb2;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(43, 39, 34, 0.06);
      }
      input[type="text"]::placeholder {
        color: #b6afa3;
      }

      button[type="submit"] {
        width: 100%;
        padding: 12px;
        margin-top: 4px;
        border: none;
        border-radius: var(--radius);
        background: var(--accent);
        color: #fff;
        font-size: 0.92rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s var(--ease), box-shadow 0.2s var(--ease);
      }
      button[type="submit"]:hover {
        background: #423c34;
        box-shadow: var(--shadow-md);
      }
      button[type="submit"]:disabled {
        opacity: 0.65;
        cursor: wait;
        box-shadow: none;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        display: none;
        animation: spin 0.7s linear infinite;
      }
      button[type="submit"]:disabled .spinner {
        display: inline-block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ---------- Status ---------- */
      #status {
        margin-top: 12px;
        font-size: 0.84rem;
        min-height: 1.2em;
        color: var(--muted);
      }
      #status.error {
        color: var(--danger);
        font-weight: 500;
      }

      /* ---------- Summary ---------- */
      .section {
        margin-top: 28px;
        animation: fadeUp 0.35s var(--ease);
      }
      .section h3 {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 12px;
      }
      .hidden {
        display: none;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .summary-grid > div {
        background: #fdfcfa;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
      }
      .summary-grid .label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        font-weight: 600;
      }
      .summary-grid .value {
        font-size: 1.05rem;
        font-weight: 600;
        margin-top: 4px;
      }

      /* ---------- Stops ---------- */
      .stop {
        background: #fdfcfa;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-bottom: 10px;
        animation: fadeUp 0.35s var(--ease) both;
        animation-delay: calc(var(--i, 0) * 60ms);
        transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
      }
      .stop:hover {
        border-color: #cfc8bb;
        box-shadow: var(--shadow-sm);
      }
      .stop-header {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .stop-index {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--fuel);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .stop-detail {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 4px;
        padding-left: 30px;
      }
      .no-stops {
        font-size: 0.86rem;
        color: var(--muted);
        background: #fdfcfa;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        padding: 14px;
        text-align: center;
        margin: 0;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ---------- Map ---------- */
      #map {
        flex: 1;
        min-width: 0;
        background: #f6f3ee;
      }

      /* ---------- Leaflet tweaks ---------- */
      .leaflet-popup-content-wrapper {
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
      }
      .leaflet-popup-content {
        font-family: inherit;
        font-size: 0.84rem;
        line-height: 1.6;
        margin: 12px 14px;
      }
      .leaflet-control-zoom {
        border: 1px solid var(--border) !important;
        border-radius: 8px !important;
        overflow: hidden;
        box-shadow: var(--shadow-sm) !important;
      }

      .pin {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 600;
        font-size: 0.78rem;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(43, 39, 34, 0.3);
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 720px) {
        .layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          max-height: 50vh;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>Fuel Route Planner</h1>
        <p class="subtitle">
          Plan a route across the US with cost-optimal fuel stops.
        </p>

        <form id="route-form">
          <label for="start">Start</label>
          <div class="input-wrap">
            <span class="dot dot-start"></span>
            <input
              type="text"
              id="start"
              placeholder="e.g. Los Angeles, CA"
              required
            />
          </div>

          <label for="finish">Finish</label>
          <div class="input-wrap">
            <span class="dot dot-finish"></span>
            <input
              type="text"
              id="finish"
              placeholder="e.g. Chicago, IL"
              required
            />
          </div>

          <button type="submit" id="submit-btn">
            <span class="spinner"></span>
            <span>Plan Route</span>
          </button>
        </form>
        <div id="status"></div>

        <div id="summary" class="section hidden">
          <h3>Trip Summary</h3>
          <div class="summary-grid">
            <div>
              <div class="label">Distance</div>
              <div class="value" id="summary-distance">-</div>
            </div>
            <div>
              <div class="label">Drive Time</div>
              <div class="value" id="summary-duration">-</div>
            </div>
            <div>
              <div class="label">Fuel Cost</div>
              <div class="value" id="summary-fuel-cost">-</div>
            </div>
            <div>
              <div class="label">Fuel Used</div>
              <div class="value" id="summary-fuel-gallons">-</div>
            </div>
          </div>
        </div>

        <div id="stops" class="section hidden"></div>
      </aside>
      <main id="map"></main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map("map").setView([39.8283, -98.5795], 4);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(map);

      // The map container is sized by flexbox; recalculate when it changes.
      window.addEventListener("resize", () => map.invalidateSize());

      const routeLayer = L.layerGroup().addTo(map);
      const markersLayer = L.layerGroup().addTo(map);

      const form = document.getElementById("route-form");
      const submitBtn = document.getElementById("submit-btn");
      const statusEl = document.getElementById("status");
      const summaryEl = document.getElementById("summary");
      const stopsEl = document.getElementById("stops");

      function pinIcon(label, color) {
        return L.divIcon({
          className: "",
          html: `<div class="pin" style="background:${color}"><span>${label}</span></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14],
          popupAnchor: [0, -16],
        });
      }

      function setStatus(message, kind) {
        statusEl.textContent = message;
        statusEl.className = kind || "";
      }

      function formatError(data) {
        if (data && typeof data.error === "string") {
          let msg = data.error;
          if (data.gap_miles !== undefined) {
            msg +=
              ` (gap of ${data.gap_miles} mi between mile ${data.from_mile} and ${data.to_mile} ` +
              `exceeds the ${data.range_miles} mi vehicle range)`;
          }
          return msg;
        }
        if (data && typeof data === "object") {
          return Object.entries(data)
            .map(
              ([field, errors]) =>
                `${field}: ${Array.isArray(errors) ? errors.join(", ") : errors}`,
            )
            .join("; ");
        }
        return "Something went wrong while planning the route.";
      }

      function renderResult(data) {
        routeLayer.clearLayers();
        markersLayer.clearLayers();

        const latlngs = data.geometry.map((p) => [p.latitude, p.longitude]);

        // White casing under the line keeps the route readable on any tile.
        L.polyline(latlngs, {
          color: "#ffffff",
          weight: 7,
          opacity: 0.9,
          smoothFactor: 1,
        }).addTo(routeLayer);
        const route = L.polyline(latlngs, {
          color: "#3d3833",
          weight: 4,
          opacity: 0.95,
          smoothFactor: 1,
        }).addTo(routeLayer);

        L.marker([data.origin.latitude, data.origin.longitude], {
          icon: pinIcon("A", "#2e7d52"),
        })
          .addTo(markersLayer)
          .bindPopup("<strong>Start</strong>");

        L.marker([data.destination.latitude, data.destination.longitude], {
          icon: pinIcon("B", "#b3473f"),
        })
          .addTo(markersLayer)
          .bindPopup("<strong>Finish</strong>");

        // Fit to everything: route line, endpoints, and every fuel stop.
        const bounds = route.getBounds();
        bounds.extend([data.origin.latitude, data.origin.longitude]);
        bounds.extend([data.destination.latitude, data.destination.longitude]);

        data.fuel_plan.stops.forEach((stop, i) => {
          const station = stop.station;
          bounds.extend([station.latitude, station.longitude]);
          L.marker([station.latitude, station.longitude], {
            icon: pinIcon(String(i + 1), "#b07d2b"),
          })
            .addTo(markersLayer)
            .bindPopup(
              `<strong>${station.name}</strong><br>` +
                `${station.address}, ${station.city}, ${station.state}<br>` +
                `Mile ${stop.mile_marker} &middot; ${stop.gallons_purchased.toFixed(2)} gal @ ` +
                `$${stop.price_per_gallon.toFixed(3)}/gal<br>` +
                `<strong>$${stop.cost.toFixed(2)}</strong>`,
            );
        });

        map.invalidateSize();
        map.fitBounds(bounds, { padding: [48, 48] });

        const hours = Math.floor(data.duration_seconds / 3600);
        const minutes = Math.round((data.duration_seconds % 3600) / 60);

        document.getElementById("summary-distance").textContent =
          `${data.distance_miles} mi`;
        document.getElementById("summary-duration").textContent =
          `${hours}h ${minutes}m`;
        document.getElementById("summary-fuel-cost").textContent =
          `$${data.fuel_plan.total_cost.toFixed(2)}`;
        document.getElementById("summary-fuel-gallons").textContent =
          `${data.fuel_plan.total_gallons.toFixed(2)} gal`;
        summaryEl.classList.remove("hidden");
        stopsEl.classList.remove("hidden");

        if (data.fuel_plan.stops.length === 0) {
          stopsEl.innerHTML =
            '<h3>Fuel Stops</h3><p class="no-stops">' +
            "No refueling stops needed - this trip fits within the vehicle's range.</p>";
          return;
        }

        stopsEl.innerHTML =
          "<h3>Fuel Stops</h3>" +
          data.fuel_plan.stops
            .map((stop, i) => {
              const station = stop.station;
              return `
          <div class="stop" style="--i:${i}">
            <div class="stop-header">
              <span class="stop-index">${i + 1}</span>
              <span>${station.name}</span>
            </div>
            <div class="stop-detail">${station.city}, ${station.state} &middot; mile ${stop.mile_marker}</div>
            <div class="stop-detail">
              ${stop.gallons_purchased.toFixed(2)} gal @ $${stop.price_per_gallon.toFixed(3)}/gal
              = $${stop.cost.toFixed(2)}
            </div>
          </div>
        `;
            })
            .join("");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const start = document.getElementById("start").value.trim();
        const finish = document.getElementById("finish").value.trim();
        if (!start || !finish) {
          return;
        }

        submitBtn.disabled = true;
        summaryEl.classList.add("hidden");
        stopsEl.classList.add("hidden");
        stopsEl.innerHTML = "";
        setStatus("Planning route...", "loading");

        try {
          const response = await fetch("/api/v1/routes/plan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ start, finish }),
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(formatError(data));
          }

          setStatus("", "");
          renderResult(data);
        } catch (err) {
          setStatus(err.message, "error");
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
