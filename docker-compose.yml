services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=spotter_db
      - POSTGRES_USER=spotter_user
      - POSTGRES_PASSWORD=spotter_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotter_user -d spotter_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://spotter_user:spotter_password@db:5432/spotter_db
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DJANGO_SECRET_KEY=dev-secret-key
      - DJANGO_DEBUG=True
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
